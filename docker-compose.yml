version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nationlens-postgres
    environment:
      POSTGRES_DB: nationlens
      POSTGRES_USER: nationlens
      POSTGRES_PASSWORD: nationlens123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nationlens -d nationlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: nationlens-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nationlens
      SPRING_DATASOURCE_USERNAME: nationlens
      SPRING_DATASOURCE_PASSWORD: nationlens123
      JWT_SECRET: NationLensSecretKey2024VeryLongAndSecureKeyForProductionUseOnly
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
