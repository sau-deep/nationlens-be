spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # Liquibase owns schema in production — never let Hibernate create tables.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:5000}

nationlens:
  cors:
    # CloudFront prod origin + localhost so developers can point a local frontend
    # at the deployed AWS backend (dev-only Backend Switcher). Auth is Bearer-token
    # (localStorage), not cookies, so allowing localhost here carries minimal risk.
    # Override entirely via NATIONLENS_CORS_ALLOWED_ORIGINS (comma-separated) in AWS EB env.
    allowed-origins: ${NATIONLENS_CORS_ALLOWED_ORIGINS:https://d3rzn1740h1qlc.cloudfront.net,http://localhost:3000,http://localhost:3001}
  otp:
    # OTP disabled until go-live. Set OTP_ENABLED=true in AWS EB env when MSG91 is ready.
    enabled: ${OTP_ENABLED:false}
    dev-bypass-code: ${OTP_DEV_BYPASS_CODE:123456}
    # No-OTP one-tap login must stay OFF in production. Defaults false; only flip via
    # DEV_LOGIN_ENABLED if you explicitly accept that anyone can log in as any number.
    dev-login: ${DEV_LOGIN_ENABLED:false}

logging:
  level:
    com.nationlens: INFO
    org.springframework.security: WARN
    liquibase: INFO
    root: INFO
