spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${SERVER_PORT:5000}

nationlens:
  otp:
    # OTP disabled until go-live. Set OTP_ENABLED=true in AWS EB env when MSG91 is ready.
    enabled: ${OTP_ENABLED:false}
    dev-bypass-code: ${OTP_DEV_BYPASS_CODE:123456}

logging:
  level:
    com.nationlens: INFO
    org.springframework.security: WARN
    liquibase: INFO
    root: INFO
