spring:
  application:
    name: nationlens-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/nationlens?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:nationlens}
    password: ${SPRING_DATASOURCE_PASSWORD:nationlens123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Liquibase owns the schema; 'validate' crash-loops on MySQL TINYINT-vs-BIT
      # boolean representation. 'update' does additive sync only and tolerates it.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

nationlens:
  jwt:
    secret: ${JWT_SECRET:NationLensSecretKey2024VeryLongAndSecureKeyForProductionUseOnlyMustBe32Chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${NATIONLENS_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  rss:
    # How often to re-fetch all RSS feeds (ms). Default 2 hours. Set RSS_FETCH_INTERVAL_MS to override.
    fetch-interval-ms: ${RSS_FETCH_INTERVAL_MS:7200000}
  otp:
    # Set OTP_ENABLED=true when MSG91 is live. Until then, use dev-bypass-code on verify.
    enabled: ${OTP_ENABLED:false}
    dev-bypass-code: ${OTP_DEV_BYPASS_CODE:123456}

msg91:
  authkey: ${MSG91_AUTHKEY:467759AK9OsJyrK168baf5d7P1}
  widget-id: ${MSG91_WIDGET_ID:3569656e6455363038373834}
  base-url: https://api.msg91.com/api/v5/widget

logging:
  level:
    com.nationlens: DEBUG
    org.springframework.security: INFO
    liquibase: INFO
