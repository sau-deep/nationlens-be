spring:
  application:
    name: nationlens-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nationlens}
    username: ${SPRING_DATASOURCE_USERNAME:nationlens}
    password: ${SPRING_DATASOURCE_PASSWORD:nationlens123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

nationlens:
  jwt:
    secret: ${JWT_SECRET:NationLensSecretKey2024VeryLongAndSecureKeyForProductionUseOnlyMustBe32Chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001

msg91:
  authkey: 467759AK9OsJyrK168baf5d7P1
  widget-id: 3569656e6455363038373834
  base-url: https://api.msg91.com/api/v5/widget

logging:
  level:
    com.nationlens: DEBUG
    org.springframework.security: INFO
    liquibase: INFO
